name: Go CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Read build version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"
          fi

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          CGO_ENABLED: 0
        run: go test -v ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: --timeout=5m

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build Binaries
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Read build version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"
          fi

      - name: Build server binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Build all binaries in cmd/
            for dir in cmd/*; do
              if [ -d "$dir" ]; then
                target=$(basename "$dir")
                go build -ldflags="-s -w" -v -o "dist/${target}.exe" "./$dir"
              fi
            done
          else
            # Build all binaries in cmd/
            for dir in cmd/*; do
              if [ -d "$dir" ]; then
                target=$(basename "$dir")
                go build -ldflags="-s -w" -v -o "dist/${target}" "./$dir"
              fi
            done
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: animate-server-${{ env.APP_VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  package:
    name: Package Archives
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Read package version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"
          fi

      - name: Build versioned packages
        run: bash ./scripts/package.sh "$APP_VERSION"

      - name: Upload packaged archives
        uses: actions/upload-artifact@v4
        with:
          name: animate-packages-${{ env.APP_VERSION }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.exe
          retention-days: 7

  package-dmg:
    name: Package macOS DMG
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Read package version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"
          fi

      - name: Build DMG packages
        env:
          PACKAGE_TARGETS: darwin/amd64,darwin/arm64
          PACKAGE_INCLUDE_ARCHIVES: "0"
          PACKAGE_INCLUDE_WINDOWS_STANDALONE: "0"
          PACKAGE_INCLUDE_DMG: "1"
        run: bash ./scripts/package.sh "$APP_VERSION"

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: animate-dmg-${{ env.APP_VERSION }}
          path: dist/*.dmg
          retention-days: 7

  release:
    name: Create GitHub Release
    needs:
      - package
      - package-dmg
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read release version
        run: echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release checksums
        run: |
          cd dist
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 * > SHA256SUMS.txt
          else
            sha256sum * > SHA256SUMS.txt
          fi

      - name: Validate updater release assets
        run: DIST_DIR=./dist bash ./scripts/check_release_assets.sh "$APP_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: ${{ env.APP_VERSION }}
          generate_release_notes: true
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.exe
            dist/*.dmg
            dist/SHA256SUMS.txt
