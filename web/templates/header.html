{{ define "header.html" }}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animate Auto Tool</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Tailwind CSS -->
    <script src="/static/js/tailwindcss.js?v=3"></script>
    <!-- HTMX & Extensions -->
    <script src="https://unpkg.com/htmx.org@1.9.10"
        integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ffb6c1', // 浅粉色
                        secondary: '#87ceeb', // 天蓝色
                        accent: '#ff69b4', // 热粉红
                        glass: 'rgba(255, 255, 255, 0.7)',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body {
             font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .nav-link {
            @apply px-4 py-2 rounded-lg transition-colors duration-200 hover:bg-primary hover:text-white font-medium text-gray-700 block;
        }
        .nav-link.active {
            @apply bg-primary text-white;
        }
        
        /* HTMX Indicator Support */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
        
        /* Smooth swap animation */
        .htmx-swapping {
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s ease-out;
        }

        /* Alpine.js Cloak */
        [x-cloak] {
            display: none !important;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
    <script>
        function updateActiveLink() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath || (href !== '/' && currentPath.startsWith(href))) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', updateActiveLink);
        document.addEventListener('htmx:pushedIntoHistory', updateActiveLink);
        document.addEventListener('htmx:historyRestore', updateActiveLink);
        // Also trigger on generic load to catch pure swaps if needed, though pushedIntoHistory covers most nav
        // Also trigger on generic load to catch pure swaps if needed, though pushedIntoHistory covers most nav
        document.addEventListener('htmx:afterOnLoad', updateActiveLink);

        // Global Error Handling for HTMX
        document.addEventListener('htmx:responseError', function (evt) {
            if (evt.detail.xhr.status === 401) {
                window.location.href = '/login';
            }
        });

        // Initialize Alpine components
        document.addEventListener('alpine:init', () => {
            Alpine.data('globalManager', () => ({
                progress: {
                    isRunning: false,
                    title: '任务处理中',
                    current: 0,
                    total: 100,
                    currentTitle: ''
                },
                mobileNavOpen: false,
                init() {
                    this.$watch('mobileNavOpen', (open) => {
                        document.body.classList.toggle('overflow-hidden', open && window.innerWidth < 1024);
                    });
                    window.addEventListener('resize', () => {
                        if (window.innerWidth >= 1024) {
                            this.mobileNavOpen = false;
                            document.body.classList.remove('overflow-hidden');
                        }
                    });
                    this.loadBackground();
                    this.connect();
                },
                closeMobileNav() {
                    this.mobileNavOpen = false;
                },
                loadBackground() {
                    // Default Background
                    const defaultBg = "url('/static/img/bg.png')";

                    fetch('/api/ui/background/random')
                        .then(res => res.json())
                        .then(data => {
                            if (data.success && data.url) {
                                document.body.style.backgroundImage = `url('${data.url}')`;
                            } else {
                                // Keep default defined in CSS/Style
                            }
                        })
                        .catch(err => console.log('Failed to load dynamic background:', err));
                },
                connect() {
                    console.log('Global Manager Connecting to SSE...');
                    const source = new EventSource('/api/events');

                    source.addEventListener('scan_progress', (e) => {
                        const data = JSON.parse(e.data);
                        this.progress.isRunning = true;
                        this.progress.title = '正在扫描目录';
                        if (data.type === 'progress') {
                            this.progress.current = data.current;
                            this.progress.total = data.total;
                            this.progress.currentTitle = data.dir;
                        }
                    });

                    source.addEventListener('scan_complete', (e) => {
                        const data = JSON.parse(e.data);
                        this.progress.isRunning = false;
                        if (data.scope === 'run') {
                            this.showToast(data.summary || '扫描完成', 'success');
                        }
                        window.dispatchEvent(new CustomEvent('scan-complete', { detail: data }));
                    });

                    source.addEventListener('scan_run', (e) => {
                        const data = JSON.parse(e.data);
                        window.dispatchEvent(new CustomEvent('scan-run-updated', { detail: data }));
                    });

                    source.addEventListener('metadata_updated', (e) => {
                        const data = JSON.parse(e.data);
                        if (data.type === 'progress') {
                            this.progress.isRunning = true;
                            this.progress.title = '正在获取元数据';
                            this.progress.current = data.current;
                            this.progress.total = data.total;
                            this.progress.currentTitle = data.title;
                        } else if (data.type === 'complete') {
                            this.progress.isRunning = false;
                            this.showToast(data.message || '元数据刷新完成', 'success');
                        } else if (data.type === 'new_anime') {
                            this.showToast(`发现新番剧: ${data.title}`, 'info');
                        }
                    });

                    source.addEventListener('subscription_run', (e) => {
                        const data = JSON.parse(e.data);
                        window.dispatchEvent(new CustomEvent('subscription-updated', { detail: data }));

                        if (data.status === 'error') {
                            this.showToast(`${data.title}: ${data.summary}`, 'error');
                        } else if (data.status === 'warning') {
                            this.showToast(`${data.title}: ${data.summary}`, 'info');
                        }
                    });

                    source.onerror = () => {
                        console.warn('SSE disconnected');
                    };

                    source.addEventListener('scheduler_run', (e) => {
                        const data = JSON.parse(e.data);
                        window.dispatchEvent(new CustomEvent('scheduler-updated', { detail: data }));
                    });

                    source.addEventListener('download_ready', (e) => {
                        const data = JSON.parse(e.data);
                        const msg = data.episode_title
                            ? `下载完成: ${data.title} · ${data.episode_title}`
                            : `下载完成: ${data.title}`;
                        this.showToast(msg, 'success', data.url ? {
                            label: '打开',
                            href: data.url,
                        } : null);
                    });

                    source.addEventListener('library_issue', (e) => {
                        const data = JSON.parse(e.data);
                        window.dispatchEvent(new CustomEvent('library-issue-updated', { detail: data }));
                        if (data.status === 'resolved') {
                            this.showToast(`已恢复: ${data.title}`, 'success');
                            return;
                        }
                        const prefix = data.type === 'scan' ? '扫描失败' : '刮削失败';
                        this.showToast(`${prefix}: ${data.title} · ${data.message}`, 'error');
                    });

                    // Global Toast Listener
                    window.addEventListener('toast', (e) => {
                        this.showToast(e.detail.msg, e.detail.type, e.detail.action || null);
                    });
                },
                showToast(msg, type = 'info', action = null) {
                    const container = document.getElementById('toast-container');
                    if (!container) return;

                    const colors = {
                        success: 'border-green-400 bg-green-50 text-green-800',
                        info: 'border-blue-400 bg-blue-50 text-blue-800',
                        error: 'border-red-400 bg-red-50 text-red-800'
                    };

                    const toast = document.createElement('div');
                    toast.className = `p-3 rounded-lg border-l-4 shadow-md pointer-events-auto transition-all duration-300 transform translate-y-4 opacity-0 ${colors[type] || colors.info}`;
                    const actionHTML = action && action.href && action.label
                        ? `<div class="mt-2"><a href="${action.href}" class="inline-flex items-center gap-1 rounded-md bg-white/80 px-2 py-1 text-xs font-bold text-gray-700 hover:bg-white">` +
                          `${action.label}</a></div>`
                        : '';
                    toast.innerHTML = `<div class="text-sm font-medium">${msg}</div>${actionHTML}`;

                    container.appendChild(toast);

                    // Animate in
                    setTimeout(() => {
                        toast.classList.remove('translate-y-4', 'opacity-0');
                    }, 10);

                    // Animate out and remove
                    setTimeout(() => {
                        toast.classList.add('opacity-0', 'translate-y-4');
                        setTimeout(() => toast.remove(), 300);
                    }, 4000);
                }
            }));
        });
    </script>
</head>

<body class="min-h-screen overflow-x-hidden text-gray-800" x-data="globalManager" @keydown.escape.window="mobileNavOpen = false"
    style="background: url('/static/img/bg.png') no-repeat center center fixed; background-size: cover;">

    <!-- Global Manager (Progress + Toasts) -->
    <div
        class="fixed inset-x-4 bottom-4 z-[100] flex w-auto max-w-[calc(100vw-2rem)] flex-col gap-3 pointer-events-none md:inset-x-auto md:top-6 md:right-6 md:bottom-auto md:w-80">

        <!-- Progress Bar Card -->
        <template x-if="progress.isRunning">
            <div class="glass-panel p-4 shadow-2xl border-t-4 border-accent pointer-events-auto transform transition-all duration-500 translate-y-0"
                x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4"
                x-transition:enter-end="opacity-100 translate-y-0">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-gray-500 uppercase tracking-wider"
                        x-text="progress.title"></span>
                    <span class="text-xs font-bold text-accent"
                        x-text="Math.round((progress.current / progress.total) * 100) + '%'"></span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                    <div class="bg-gradient-to-r from-primary to-accent h-full transition-all duration-500 ease-out relative"
                        :style="`width: ${(progress.current / progress.total) * 100}%` ">
                        <div class="absolute inset-0 bg-white/20 animate-[shimmer_2s_infinite]"></div>
                    </div>
                </div>
                <div class="mt-2 text-[10px] text-gray-400 truncate" x-text="progress.currentTitle || '正在初始化...'"></div>
            </div>
        </template>

        <!-- Toasts Container -->
        <div id="toast-container" class="flex flex-col gap-2"></div>
    </div>

    <!-- Global Modal Layer -->
    <div id="modal-layer" class="relative z-[100]"></div>

    <div class="mx-auto flex min-h-screen w-full max-w-[1600px] flex-col gap-4 px-3 py-3 lg:h-screen lg:flex-row lg:gap-6 lg:px-4 lg:py-8 lg:overflow-hidden">
        <div class="glass-panel flex items-center justify-between px-4 py-3 lg:hidden">
            <div class="flex min-w-0 items-center gap-3">
                <button type="button" @click="mobileNavOpen = true"
                    class="inline-flex h-11 w-11 items-center justify-center rounded-xl border border-white/60 bg-white/80 text-2xl text-gray-700 shadow-sm transition hover:bg-white"
                    aria-label="打开导航菜单">
                    ☰
                </button>
                <div class="min-w-0">
                    <div class="flex items-center gap-2">
                        <h1 class="truncate text-lg font-black text-accent">AnimateTool</h1>
                        <div x-show="progress.isRunning" x-transition.opacity
                            @click="showToast(progress.title + ': ' + progress.currentTitle, 'info')"
                            class="h-3.5 w-3.5 shrink-0 cursor-pointer rounded-full border-2 border-accent border-t-transparent animate-spin"
                            title="点击查看任务详情"></div>
                    </div>
                    <p class="truncate text-xs text-gray-500">移动端导航与任务提醒</p>
                </div>
            </div>
            <a href="/logout" class="rounded-xl px-3 py-2 text-sm font-bold text-red-500 transition hover:bg-red-50">退出</a>
        </div>

        <div x-show="mobileNavOpen" x-cloak class="fixed inset-0 z-[95] lg:hidden" style="display: none;">
            <div class="absolute inset-0 bg-slate-900/45 backdrop-blur-sm" @click="closeMobileNav()"></div>
            <aside
                class="absolute inset-y-0 left-0 flex w-[min(85vw,22rem)] max-w-sm flex-col border-r border-white/40 bg-white/92 p-5 shadow-2xl backdrop-blur-xl">
                <div class="mb-6 flex items-center justify-between gap-3">
                    <div>
                        <h2 class="text-xl font-black text-accent">AnimateTool</h2>
                        <p class="text-xs text-gray-500">快速导航</p>
                    </div>
                    <button type="button" @click="closeMobileNav()"
                        class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-gray-200 bg-white text-xl text-gray-600 shadow-sm">
                        ×
                    </button>
                </div>

                <nav class="flex flex-1 flex-col gap-2">
                    <a href="/" class="nav-link" @click="closeMobileNav()">📊 仪表盘</a>
                    <a href="/calendar" class="nav-link" @click="closeMobileNav()">🗓️ 追番日历</a>
                    <a href="/subscriptions" class="nav-link" @click="closeMobileNav()">📺 订阅管理</a>
                    <a href="/library" class="nav-link" @click="closeMobileNav()">📚 番剧图鉴</a>
                    <a href="/local-anime" class="nav-link" @click="closeMobileNav()">📁 本地番剧</a>
                    <a href="/settings" class="nav-link" @click="closeMobileNav()">⚙️ 系统设置</a>

                    <div class="mt-auto pt-4 border-t border-gray-200/70">
                        <a href="/logout" class="nav-link text-red-500 hover:bg-red-50 hover:text-red-600"
                            @click="closeMobileNav()">🚪 退出登录</a>
                    </div>
                </nav>
            </aside>
        </div>

        <!-- Sidebar -->
        <div class="hidden w-64 glass-panel h-full p-6 shrink-0 lg:flex lg:flex-col">
            <h1 class="text-2xl font-bold text-accent mb-8 flex items-center gap-2">
                <span>AnimateTool</span>
                <!-- Persistent Small Spinner -->
                <div x-show="progress.isRunning" x-transition.opacity
                    @click="showToast(progress.title + ': ' + progress.currentTitle, 'info')"
                    class="w-4 h-4 border-2 border-accent border-t-transparent rounded-full animate-spin ml-2 cursor-pointer hover:scale-110 transition-transform"
                    title="点击查看任务详情"></div>
            </h1>

            <nav class="flex flex-col gap-2 flex-1">
                <a href="/" class="nav-link" hx-get="/" hx-target="#main-content" hx-push-url="true">
                    📊 仪表盘
                </a>
                <a href="/calendar" class="nav-link" hx-get="/calendar" hx-target="#main-content" hx-push-url="true">
                    🗓️ 追番日历
                </a>
                <a href="/subscriptions" class="nav-link" hx-get="/subscriptions" hx-target="#main-content"
                    hx-push-url="true">
                    📺 订阅管理
                </a>
                <a href="/library" class="nav-link" hx-get="/library" hx-target="#main-content" hx-push-url="true">
                    📚 番剧图鉴
                </a>
                <a href="/local-anime" class="nav-link" hx-get="/local-anime" hx-target="#main-content"
                    hx-push-url="true">
                    📁 本地番剧
                </a>
                <a href="/settings" class="nav-link" hx-get="/settings" hx-target="#main-content" hx-push-url="true">
                    ⚙️ 系统设置
                </a>


                <div class="mt-auto pt-4 border-t border-gray-200/50">
                    <a href="/logout" class="nav-link text-red-500 hover:bg-red-50 hover:text-red-600">
                        🚪 退出登录
                    </a>
                </div>
            </nav>

            <div class="text-xs text-gray-500 text-center mt-4">
                v0.4.3 Beta
            </div>
        </div>

        <!-- Main Content -->
        <main id="main-content" class="glass-panel min-h-0 flex-1 p-4 md:p-6 lg:h-full lg:overflow-y-auto lg:p-8">
            {{ end }}
