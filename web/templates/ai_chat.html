{{ define "ai_chat.html" }}
<div x-data="{ 
    open: false,
    messages: [
        { role: 'assistant', content: '你好！我是您的 AnimateTool 智能管家。有什么我可以帮您的吗？' }
    ],
    scrollToBottom() {
        this.$nextTick(() => {
            const history = document.getElementById('chat-history');
            if (history) history.scrollTop = history.scrollHeight;
        });
    }
}" class="fixed bottom-6 right-6 z-[200]">
    
    <!-- Gemini Sparkle Toggle Button -->
    <button @click="open = !open; if(open) scrollToBottom()" 
            class="group relative flex h-14 w-14 items-center justify-center rounded-2xl bg-white shadow-xl transition-all hover:scale-105 active:scale-95 border border-gray-100">
        <div class="absolute inset-0 rounded-2xl bg-gradient-to-tr from-blue-500/10 via-purple-500/10 to-pink-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <svg class="h-8 w-8 text-blue-600 transition-transform group-hover:rotate-12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L14.5 9L21.5 11.5L14.5 14L12 21L9.5 14L2.5 11.5L9.5 9L12 2Z" fill="currentColor" fill-opacity="0.8"/>
            <path d="M12 2L14.5 9L21.5 11.5L14.5 14L12 21L9.5 14L2.5 11.5L9.5 9L12 2Z" stroke="currentColor" stroke-width="0.5"/>
        </svg>
        <!-- Notification dot -->
        <div class="absolute -right-1 -top-1 h-3 w-3 rounded-full bg-accent border-2 border-white"></div>
    </button>

    <!-- Gemini-Style Chat Window -->
    <div x-show="open" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-8 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-8 scale-95"
         @click.away="open = false"
         class="absolute bottom-20 right-0 flex flex-col overflow-hidden rounded-[2rem] bg-white shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-gray-100 w-[90vw] md:w-[450px] lg:w-[500px]"
         style="height: 650px; max-height: calc(100vh - 120px); display: none;">
        
        <!-- Header -->
        <div class="flex items-center justify-between border-b border-gray-50 px-6 py-4">
            <div class="flex items-center gap-3">
                <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-blue-50 text-blue-600">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L14.5 9L21.5 11.5L14.5 14L12 21L9.5 14L2.5 11.5L9.5 9L12 2Z"/>
                    </svg>
                </div>
                <div>
                    <h2 class="text-sm font-bold text-gray-800">AnimateTool AI</h2>
                    <div class="flex items-center gap-1.5">
                        <span class="relative flex h-1.5 w-1.5">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-green-500"></span>
                        </span>
                        <span class="text-[10px] font-medium text-gray-400 uppercase tracking-widest">在线助手</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button hx-post="/api/ai/clear" hx-target="#chat-history" @click="messages = []"
                        class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors" title="清空对话">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
                <button @click="open = false" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat History -->
        <div id="chat-history" 
             class="flex-1 overflow-y-auto px-6 py-6 scroll-smooth space-y-8 bg-white"
             style="scrollbar-width: thin; scrollbar-color: #f3f4f6 transparent;">
            
            <template x-for="(msg, index) in messages" :key="index">
                <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                    <div :class="msg.role === 'user' ? 'bg-gray-100 text-gray-800 rounded-2xl px-4 py-3 max-w-[85%]' : 'w-full'">
                        <!-- Assistant Header with Icon -->
                        <div x-show="msg.role === 'assistant'" class="flex items-center gap-2 mb-2">
                            <div class="h-6 w-6 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
                                <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2L14.5 9L21.5 11.5L14.5 14L12 21L9.5 14L2.5 11.5L9.5 9L12 2Z"/>
                                </svg>
                            </div>
                            <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">AI 助手</span>
                        </div>
                        
                        <div class="text-[15px] leading-relaxed" 
                             :class="msg.role === 'user' ? '' : 'text-gray-700 pl-8'"
                             x-html="msg.content.replace(/\n/g, '<br>')">
                        </div>
                    </div>
                </div>
            </template>
            
            <!-- HTMX Appended Messages will land here -->
            <div id="htmx-messages" class="space-y-8"></div>

            <!-- Loading State (managed by htmx-indicator) -->
            <div class="htmx-indicator flex items-start gap-2 pl-8">
                 <div class="flex items-center gap-1.5 h-6">
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-bounce" style="animation-delay: 0ms"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-bounce" style="animation-delay: 150ms"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-bounce" style="animation-delay: 300ms"></div>
                 </div>
            </div>
        </div>

        <!-- Input Area (Gemini Style) -->
        <div class="px-6 pb-6 pt-2 bg-white">
            <form hx-post="/api/ai/chat" 
                  hx-target="#htmx-messages" 
                  hx-swap="beforeend"
                  @htmx:before-request="messages.push({role: 'user', content: $refs.input.value}); $refs.input.value = ''; $refs.input.style.height = 'auto'; scrollToBottom()"
                  @htmx:after-request="scrollToBottom()"
                  class="relative group">
                
                <div class="relative flex items-end gap-2 bg-gray-50 rounded-[1.5rem] border border-gray-100 p-2 focus-within:bg-white focus-within:ring-2 focus-within:ring-blue-500/20 focus-within:border-blue-400 transition-all">
                    <textarea x-ref="input"
                              name="message" 
                              rows="1"
                              @keydown.enter.prevent="if(!$event.shiftKey && !$event.isComposing) $el.form.dispatchEvent(new Event('submit', {bubbles: true}))"
                              @input="$el.style.height = 'auto'; $el.style.height = $el.scrollHeight + 'px'"
                              placeholder="问问 AI 助手..." 
                              class="flex-1 max-h-40 bg-transparent px-3 py-2 text-[15px] text-gray-800 placeholder-gray-400 outline-none resize-none"
                              required></textarea>
                    
                    <button type="submit" 
                            class="mb-1 mr-1 flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 transition-transform hover:scale-105 active:scale-95 disabled:opacity-50">
                        <svg class="h-5 w-5 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                        </svg>
                    </button>
                </div>
                
                <p class="mt-2 text-[10px] text-center text-gray-400">
                    AI 可能会产生错误信息，请核实重要指令。
                </p>
            </form>
        </div>
    </div>
</div>

<style>
    /* Gemini specific styles */
    #chat-history .assistant-bubble {
        @apply w-full text-gray-700 pl-8 leading-relaxed;
    }
    #chat-history .user-bubble-wrapper {
        @apply flex justify-end mb-6;
    }
    #chat-history .user-bubble {
        @apply bg-gray-100 text-gray-800 rounded-2xl px-4 py-3 max-w-[85%] text-[15px];
    }
    
    .htmx-indicator {
        display: none;
    }
    .htmx-request .htmx-indicator {
        display: flex;
    }
</style>

<script>
    // Handle appending HTML from HTMX while keeping Alpine in sync if needed, 
    // but here we just let HTMX append to #htmx-messages for simplicity.
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'htmx-messages') {
            const history = document.getElementById('chat-history');
            history.scrollTop = history.scrollHeight;
        }
    });
</script>
{{ end }}
